<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TNAS Job Post - Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; background: #fff; padding: 30px; margin: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Post a New Job on TNAS</h2>
    <form action="submit_job.php" method="POST">
        <div class="form-group">
            <label>Job Title</label>
            <input type="text" name="job_title" placeholder="e.g. Staff Nurse" required>
        </div>
        <div class="form-group">
            <label>Hospital/Company Name</label>
            <input type="text" name="company_name" required>
        </div>
        <div class="form-group">
            <label>Location</label>
            <input type="text" name="location" placeholder="e.g. Delhi, Mumbai" required>
        </div>
        <div class="form-group">
            <label>Job Description</label>
            <textarea name="description" rows="5" required></textarea>
        </div>
        <div class="form-group">
            <label>Salary Range</label>
            <input type="text" name="salary" placeholder="e.g. ₹25,000 - ₹40,000">
        </div>
        <button type="submit" name="submit">Publish Job</button>
    </form>
</div>

</body>
</html>
<script type="application/ld+json">
{
  "@context": "https://schema.org/",
  "@type": "JobPosting",
  "title": "SSC GD Constable 2024",
  "description": "Full notification details here...",
  "datePosted": "2024-03-31",
  "validThrough": "2024-05-31",
  "hiringOrganization": {
    "@type": "Organization",
    "name": "SSC",
    "sameAs": "https://ssc.nic.in"
  },
  "jobLocation": {
    "@type": "Place",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "IN"
    }
  }
}
</script>
